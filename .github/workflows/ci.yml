name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  rust:
    name: Rust check & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-2022]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt, llvm-tools-preview
      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: src-tauri }
      - run: cargo install cargo-llvm-cov --locked
        working-directory: src-tauri
      - run: cargo check --all-targets
        working-directory: src-tauri
      - run: cargo llvm-cov --lib --ignore-filename-regex 'lib\.rs$|main\.rs$' --fail-under-lines 95 --fail-under-functions 95
        working-directory: src-tauri

  frontend:
    name: Frontend check & test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run test:coverage

  lint:
    name: Lint (ESLint + Prettier + Rustfmt + Clippy)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: src-tauri }
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - name: Rust fmt
        working-directory: src-tauri
        run: cargo fmt --all -- --check
      - name: Rust clippy
        working-directory: src-tauri
        run: cargo clippy --lib --all-targets -- -D warnings

  commitlint:
    name: Commitlint (PR commits)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun x commitlint --from=${{ github.event.pull_request.base.sha }} --to=${{ github.event.pull_request.head.sha }} --verbose

  e2e:
    name: E2E smoke (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-2022]
    runs-on: ${{ matrix.os }}
    needs: [rust, frontend, lint]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: oven-sh/setup-bun@v2
      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: src-tauri }
      - run: bun install --frozen-lockfile
      - run: bun x playwright install chromium
      - run: bun run e2e
